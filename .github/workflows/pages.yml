name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html app.js styles.css scheme-standalone.html .nojekyll _site/
          cp -R canva _site/canva

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true

      - name: Sync docs folder on main
        run: |
          rm -rf docs
          mkdir -p docs
          cp index.html app.js styles.css scheme-standalone.html .nojekyll docs/
          cp -R canva docs/canva
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "docs folder is up to date"
          else
            git commit -m "Sync docs folder for GitHub Pages"
            git push
          fi
